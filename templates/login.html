<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — KPI Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='sources/icon/SITE-ICON.svg') }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── Floating Background Shapes ────────────────── */
        .bg-shape {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            z-index: 0;
        }

        .bg-shape-1 {
            width: 400px;
            height: 400px;
            background: #00919A;
            top: -100px;
            left: -100px;
        }

        .bg-shape-2 {
            width: 300px;
            height: 300px;
            background: #FFDD00;
            bottom: -80px;
            right: -60px;
        }

        .bg-shape-3 {
            width: 200px;
            height: 200px;
            background: #00919A;
            bottom: 100px;
            left: 60px;
        }

        /* ── Login Card ────────────────────────────────── */
        .login-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 420px;
            padding: 48px 40px;
            position: relative;
            z-index: 1;
            animation: fadeSlideUp 0.5s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Logo & Branding ───────────────────────────── */
        .login-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 22px;
            font-weight: 800;
            color: #1e293b;
            text-align: center;
            line-height: 1.3;
        }

        .login-subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 6px;
            font-weight: 500;
        }

        /* ── Form ──────────────────────────────────────── */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            font-family: inherit;
            font-size: 15px;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            background: #f8fafc;
        }

        .form-input:focus {
            border-color: #00919A;
            box-shadow: 0 0 0 3px rgba(0, 145, 154, 0.12);
            background: #ffffff;
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        /* ── Password Wrapper ──────────────────────────── */
        .password-wrapper {
            position: relative;
        }

        .password-wrapper .form-input {
            padding-right: 48px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            padding: 4px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #00919A;
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
        }

        /* ── Error Message ─────────────────────────────── */
        .error-message {
            background-color: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-6px);
            }

            40%,
            80% {
                transform: translateX(6px);
            }
        }

        .error-message svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* ── Submit Button ─────────────────────────────── */
        .btn-login {
            width: 100%;
            font-family: inherit;
            font-size: 15px;
            font-weight: 800;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #00919A 0%, #007a82 100%);
            color: #ffffff;
            transition: transform 0.15s, box-shadow 0.25s;
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 145, 154, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* ── Footer ────────────────────────────────────── */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }

        .login-footer .accent {
            color: #00919A;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <!-- Background shapes -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>

    <!-- Login Card -->
    <div class="login-card">
        <div class="login-brand">
            <img src="{{ url_for('static', filename='sources/icon/logo_UNJ-cropped.svg') }}" alt="UNJ Logo"
                class="login-logo" onerror="this.style.display='none'">
            <div class="login-title">International Office<br>KPI Dashboard</div>
            <div class="login-subtitle">Sign in to continue</div>
        </div>

        {% if error %}
        <div class="error-message">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="15" y1="9" x2="9" y2="15" />
                <line x1="9" y1="9" x2="15" y2="15" />
            </svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-input" id="username" name="username" placeholder="Enter your username"
                    autocomplete="username" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="password" name="password"
                        placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="login-footer">
            <span class="accent">International Office</span> — Universitas Negeri Jakarta
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>

</html>
